spring:
  cache:
    type: redis
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:onlineorder-${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
  flyway:
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration,classpath:db/demo}
  h2:
    console:
      enabled: true
      path: /h2-console
  session:
    store-type: none
  sql:
    init:
      mode: never

app:
  kafka:
    enabled: false
  cleanup:
    enabled: false
  outbox:
    publisher-enabled: false
  security:
    rate-limit:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
