services:


  db:
    image: postgres:15.2-alpine
    environment:
      POSTGRES_DB: onlineorder
      POSTGRES_PASSWORD: secret
    volumes:
      - onlineorder-pg-local:/var/lib/postgresql/data
    ports:
      - "5433:5432"


  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - onlineorder-redis-local:/data
    ports:
      - "6379:6379"


  kafka:
    image: apache/kafka-native:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - onlineorder-kafka-local:/tmp/kraft-combined-logs
    ports:
      - "9092:9092"


volumes:
  onlineorder-pg-local:
  onlineorder-redis-local:
  onlineorder-kafka-local:
