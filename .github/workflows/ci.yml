name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew test -x buildFrontend -x syncFrontendBuild --no-daemon

  package-backend:
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build backend jar
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: onlineorder-bootjar
          path: backend/build/libs/*.jar
